<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古典音乐入门指南</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="古典指南">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');

  :root {
    --bg: #fcfcfa;
    --text: #1a1a1a;
    --text-2: #555;
    --text-3: #999;
    --line: #e5e5e5;
    --accent: #b4462f;
    --green: #4a9a6e;
    --hover: #f8f7f5;
    --serif: 'Noto Serif SC', Georgia, 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  .page { max-width: 640px; margin: 0 auto; padding: 60px 24px 80px; }

  header { margin-bottom: 40px; text-align: center; }
  header h1 { font-family: var(--serif); font-size: 1.8rem; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 12px; }
  header .subtitle { color: var(--text-3); font-size: 0.88rem; letter-spacing: 0.04em; }
  .divider { width: 32px; height: 1px; background: var(--text); margin: 20px auto; }

  /* Progress */
  .progress-header { text-align: center; margin-bottom: 40px; }
  .progress-text { font-size: 0.82rem; color: var(--text-3); margin-bottom: 8px; }
  .progress-text span { color: var(--text); font-weight: 600; }
  .progress-bar-wrap { width: 100%; max-width: 200px; height: 3px; background: var(--line); border-radius: 2px; margin: 0 auto; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s ease; }

  .stage { margin-bottom: 48px; }
  .stage-head { display: flex; align-items: baseline; gap: 16px; cursor: pointer; padding: 12px 0; border-bottom: 1px solid var(--line); user-select: none; }
  .stage-head:hover .stage-title { color: var(--accent); }
  .stage-n { font-family: var(--serif); font-size: 2.4rem; font-weight: 700; color: var(--text-3); line-height: 1; flex-shrink: 0; opacity: 0.35; }
  .stage.open .stage-n { opacity: 0.6; }
  .stage-meta { flex: 1; }
  .stage-title { font-family: var(--serif); font-size: 1.05rem; font-weight: 700; transition: color 0.2s; }
  .stage-sub { font-size: 0.78rem; color: var(--text-3); margin-top: 2px; }
  .stage-toggle { font-size: 0.7rem; color: var(--text-3); transition: transform 0.3s; align-self: center; }
  .stage.open .stage-toggle { transform: rotate(180deg); }
  .stage-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.35s ease; }
  .stage.open .stage-body { grid-template-rows: 1fr; }
  .stage-body-inner { overflow: hidden; }
  .tracks { padding-top: 16px; }

  .track { border-bottom: 1px solid var(--line); }
  .track:last-child { border-bottom: none; }
  .track.listened .track-row { opacity: 0.5; }
  .track.listened:hover .track-row { opacity: 0.75; }
  .track.listened.open .track-row { opacity: 0.75; }

  .track-row { display: flex; align-items: center; gap: 14px; padding: 14px 0; cursor: pointer; transition: background 0.15s, opacity 0.3s; }
  .track-row:hover { background: var(--hover); margin: 0 -12px; padding: 14px 12px; border-radius: 6px; }

  .cover {
    width: 52px; height: 52px; border-radius: 6px; flex-shrink: 0;
    overflow: hidden; position: relative; background: #ddd;
  }
  .cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cover-fallback {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-size: 1.3rem; font-weight: 700; color: rgba(255,255,255,0.85);
  }

  .track-info { flex: 1; min-width: 0; }
  .track-cn { font-size: 0.92rem; font-weight: 600; line-height: 1.3; }
  .track-by { font-size: 0.78rem; color: var(--text-3); margin-top: 2px; }
  .track-dur { font-size: 0.72rem; color: var(--text-3); flex-shrink: 0; font-variant-numeric: tabular-nums; }

  /* Listen check button */
  .listen-btn {
    width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--line);
    background: none; cursor: pointer; flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; font-size: 0; transition: all 0.2s; color: transparent; padding: 0;
  }
  .listen-btn:hover { border-color: var(--green); }
  .track.listened .listen-btn {
    background: var(--green); border-color: var(--green); color: #fff; font-size: 0.7rem;
  }

  .track-chevron { font-size: 0.6rem; color: var(--text-3); transition: transform 0.25s; flex-shrink: 0; }
  .track.open .track-chevron { transform: rotate(90deg); }

  .track-detail { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease; }
  .track.open .track-detail { grid-template-rows: 1fr; }
  .track-detail-inner { overflow: hidden; }
  .detail-content { padding: 0 0 20px 66px; }
  .detail-en { font-size: 0.82rem; color: var(--text-2); font-style: italic; margin-bottom: 12px; line-height: 1.5; }
  .detail-section { margin-bottom: 12px; }
  .detail-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); margin-bottom: 3px; }
  .detail-text { font-size: 0.82rem; color: var(--text-2); line-height: 1.6; }
  .detail-tip { font-size: 0.82rem; color: var(--text); background: #f5f4f0; padding: 8px 12px; border-radius: 6px; border-left: 2px solid var(--accent); margin: 12px 0; }

  .action-row { display: flex; align-items: center; gap: 16px; margin-top: 12px; flex-wrap: wrap; }

  .apple-link { display: inline-flex; align-items: center; gap: 5px; font-size: 0.78rem; color: var(--accent); text-decoration: none; padding: 6px 0; transition: opacity 0.15s; }
  .apple-link:hover { opacity: 0.7; }
  .apple-link svg { width: 14px; height: 14px; fill: currentColor; }

  .tips { margin-top: 48px; padding-top: 32px; border-top: 1px solid var(--line); }
  .tips h3 { font-family: var(--serif); font-size: 1rem; margin-bottom: 16px; }
  .tips li { font-size: 0.85rem; color: var(--text-2); margin-bottom: 8px; margin-left: 18px; }

  .glossary { margin-top: 32px; padding-top: 32px; border-top: 1px solid var(--line); }
  .glossary h3 { font-family: var(--serif); font-size: 1rem; margin-bottom: 16px; }
  .glossary .intro { font-size: 0.82rem; color: var(--text-2); margin-bottom: 14px; }
  .tempo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
  .tempo-item { padding: 8px 0; }
  .tempo-word { font-style: italic; font-size: 0.85rem; font-weight: 600; }
  .tempo-meaning { font-size: 0.75rem; color: var(--text-3); }

  /* Filter chips */
  .filter-bar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: -16px 0 32px; }
  .chip {
    font-family: var(--sans); font-size: 0.78rem; color: var(--text-2);
    background: none; border: 1px solid var(--line); border-radius: 16px;
    padding: 5px 14px; cursor: pointer; transition: all 0.2s;
  }
  .chip:hover { border-color: var(--text-3); color: var(--text); }
  .chip.active { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 480px) {
    .page { padding: 40px 16px 60px; }
    header h1 { font-size: 1.5rem; }
    .cover { width: 44px; height: 44px; }
    .detail-content { padding-left: 58px; }
    .stage-n { font-size: 2rem; }
  }
</style>
</head>

    <h1>古典音乐入门指南</h1>

    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
  </div>
  <div class="filter-bar" id="filterBar">
    <button class="chip active" data-filter="all" onclick="applyFilter('all')">全部</button>
    <button class="chip" data-filter="short" onclick="applyFilter('short')">短曲 &lt; 10 min</button>
    <button class="chip" data-filter="long" onclick="applyFilter('long')">长曲 ≥ 30 min</button>

</div>

var TOTAL = 28;
var listenedSet = {};
var currentFilter = 'all';

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function loadListened() {
  try { var arr = JSON.parse(localStorage.getItem('listened') || '[]'); arr.forEach(function(id) { listenedSet[id] = true; }); } catch(e) {}
}

function saveListened() {
  localStorage.setItem('listened', JSON.stringify(Object.keys(listenedSet)));
}

function updateListenedUI() {
  var count = 0;
  for (var i = 1; i <= TOTAL; i++) {
    if (listenedSet['t' + i]) count++;
    var el = document.getElementById('t' + i);
    if (el) el.classList.toggle('listened', !!listenedSet['t' + i]);
  }
  document.getElementById('listenedCount').textContent = count;
  document.getElementById('progressFill').style.width = (count / TOTAL * 100) + '%';
}

function toggleListened(id, ev) {
  ev.stopPropagation();
  if (listenedSet[id]) { delete listenedSet[id]; } else { listenedSet[id] = true; }
  saveListened();
  updateListenedUI();
  if (currentFilter === 'unlistened') applyFilter(currentFilter);
}

function render() {
  loadListened();
  var app = document.getElementById('app');
  var idx = 0;
  var html = '';

  for (var si = 0; si < STAGES.length; si++) {
    var stage = STAGES[si];
    var tracksHtml = '';

    for (var ti = 0; ti < stage.tracks.length; ti++) {
      var t = stage.tracks[ti];
      idx++;
      var tid = 't' + idx;
      var c = COMPOSERS[t.composer];
      var pBio = PERFORMERS[t.recommend] || '';
      var url = 'https://music.apple.com/search?term=' + encodeURIComponent(t.search);

      tracksHtml += '<div class="track' + (listenedSet[tid] ? ' listened' : '') + '" id="' + tid + '" data-dur="' + parseInt(t.duration, 10) + '">' +
        '<div class="track-row" onclick="toggle(\'' + tid + '\', event)">' +
          '<div class="cover" style="background:' + esc(c.color) + '">' +
            '<img src="' + esc(c.img) + '" alt="' + esc(t.composerLabel) + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'" />' +
            '<div class="cover-fallback" style="display:none;background:' + esc(c.color) + '">' + esc(c.initial) + '</div>' +
          '</div>' +
          '<div class="track-info">' +
            '<div class="track-cn">' + esc(t.cn) + '</div>' +
            '<div class="track-by">' + esc(t.composerLabel) + ' · ' + esc(t.duration) + '</div>' +
          '</div>' +
          '<button class="listen-btn" onclick="toggleListened(\'' + tid + '\', event)" title="标记已听">✓</button>' +
          '<div class="track-chevron">▶</div>' +
        '</div>' +
        '<div class="track-detail"><div class="track-detail-inner"><div class="detail-content">' +
          '<div class="detail-en">' + esc(t.en) + '</div>' +
          '<div class="detail-tip">' + esc(t.tip) + '</div>' +
          '<div class="detail-section">' +
            '<div class="detail-label">作曲家</div>' +
            '<div class="detail-text">' + esc(c.bio) + '</div>' +
          '</div>' +
          '<div class="detail-section">' +
            '<div class="detail-label">推荐版本</div>' +
            '<div class="detail-text">' + esc(t.recommend) + (pBio ? ' — ' + esc(pBio) : '') + '</div>' +
          '</div>' +
          '<div class="action-row">' +
            '<a class="apple-link" href="' + esc(url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">' + appleSvg + ' 在 Apple Music 搜索</a>' +
          '</div>' +
        '</div></div></div>' +
      '</div>';
    }

    html += '<div class="stage' + (stage.id === 1 ? ' open' : '') + '" id="s' + stage.id + '">' +
      '<div class="stage-head" onclick="toggleStage(\'s' + stage.id + '\')">' +
        '<div class="stage-n">' + stage.id + '</div>' +
        '<div class="stage-meta">' +
          '<div class="stage-title">' + esc(stage.title) + '</div>' +
          '<div class="stage-sub">' + esc(stage.desc) + '</div>' +
        '</div>' +
        '<div class="stage-toggle">▼</div>' +
      '</div>' +
      '<div class="stage-body"><div class="stage-body-inner">' +
        '<div class="tracks">' + tracksHtml + '</div>' +
      '</div></div>' +
    '</div>';
  }

  html += '<div class="tips"><h3>聆听建议</h3><ul>' +
    '<li>觉得无聊就换下一首，回头再来</li>' +
    '<li>戴耳机 — 古典音乐动态范围大，外放容易错过细节</li>' +
    '<li>从短的听起，再挑战长的</li>' +
    '<li>同一首多听几遍 — 第一遍听旋律，第二遍听结构，第三遍听细节</li>' +
    '<li>不用懂乐理，能感受到情绪就够了</li>' +
  '</ul></div>';

  html += '<div class="glossary"><h3>速度术语小词典</h3>' +
    '<p class="intro">在 Apple Music 里常见的意大利语标记，它们是乐章的速度与情绪指示</p>' +
    '<div class="tempo-grid">' +
      '<div class="tempo-item"><div class="tempo-word">Largo</div><div class="tempo-meaning">广板 · 非常慢</div></div>' +
      '<div class="tempo-item"><div class="tempo-word">Adagio</div><div class="tempo-meaning">柔板 · 慢速抒情</div></div>' +
      '<div class="tempo-item"><div class="tempo-word">Andante</div><div class="tempo-meaning">行板 · 像散步</div></div>' +
      '<div class="tempo-item"><div class="tempo-word">Moderato</div><div class="tempo-meaning">中板 · 中等速度</div></div>' +
      '<div class="tempo-item"><div class="tempo-word">Allegretto</div><div class="tempo-meaning">小快板 · 稍快</div></div>' +
      '<div class="tempo-item"><div class="tempo-word">Allegro</div><div class="tempo-meaning">快板 · 活泼有活力</div></div>' +
      '<div class="tempo-item"><div class="tempo-word">Vivace</div><div class="tempo-meaning">活泼的 · 很快</div></div>' +
      '<div class="tempo-item"><div class="tempo-word">Presto</div><div class="tempo-meaning">急板 · 非常快</div></div>' +
    '</div></div>';

  app.innerHTML = html;
  updateListenedUI();
}

function toggleStage(id) {
  var el = document.getElementById(id);
  var opening = !el.classList.contains('open');
  document.querySelectorAll('.stage.open').forEach(function(s) { s.classList.remove('open'); });
  if (opening) el.classList.add('open');
}

function applyFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.chip').forEach(function(c) {
    c.classList.toggle('active', c.getAttribute('data-filter') === filter);
  });
  for (var i = 1; i <= TOTAL; i++) {
    var el = document.getElementById('t' + i);
    if (!el) continue;
    var dur = parseInt(el.getAttribute('data-dur'), 10) || 0;
    var listened = !!listenedSet['t' + i];
    var show = filter === 'all' ||
               (filter === 'short' && dur < 10) ||
               (filter === 'long' && dur >= 30) ||
               (filter === 'unlistened' && !listened);
    el.style.display = show ? '' : 'none';
  }
  document.querySelectorAll('.stage').forEach(function(s) {
    var anyVisible = false;
    s.querySelectorAll('.track').forEach(function(t) {
      if (t.style.display !== 'none') anyVisible = true;
    });
    s.style.display = anyVisible ? '' : 'none';
    if (filter !== 'all' && anyVisible) s.classList.add('open');
  });
}

function toggle(id, ev) {
  if (ev && (ev.target.closest('.apple-link') || ev.target.closest('.listen-btn'))) return;
  var el = document.getElementById(id);
  var opening = !el.classList.contains('open');
  document.querySelectorAll('.track.open').forEach(function(t) { t.classList.remove('open'); });
  if (opening) el.classList.add('open');
}

render();
</script>
